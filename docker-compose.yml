services:
  db:
    image: harbor.pg.innopolis.university/docker-hub-cache/postgres:18.3-alpine
    container_name: ttmm-postgres
    env_file:
      - .env.secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  qwen-code-api:
    image: qwen-code-api-qwen-code-api
    container_name: ttmm-qwen-code-api
    environment:
      QWEN_CODE_API_KEY: my-secret-qwen-key
      QWEN_CODE_AUTH_USE: "true"
      DEFAULT_MODEL: coder-model
      MAX_RETRIES: "4"
      RETRY_DELAY_MS: "900"
      LOG_LEVEL: error
      LOG_REQUESTS: "true"
      ADDRESS: 0.0.0.0
      PORT: "8080"
    ports:
      - "42005:8080"
    volumes:
      - ${HOME}/.qwen:/mnt/qwen-creds
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  llm-agent:
    build:
      context: .
      dockerfile: llm/Dockerfile
    container_name: ttmm-llm-agent
    env_file:
      - .env.secret
    environment:
      LLM_BASE_URL: http://qwen-code-api:8080/v1
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      qwen-code-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: ttmm-app
    env_file:
      - .env.secret
    environment:
      LLM_AGENT_URL: http://llm-agent:8001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      qwen-code-api:
        condition: service_healthy
      llm-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
